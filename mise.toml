[tools]
ruby = "4.0.2"

[settings]
lockfile = true
locked = true

[tasks."tap:local"]
description = "Tap this repo from the local working directory"
run = """
#!/usr/bin/env zsh
set -euo pipefail
remote_url=$(git remote get-url origin)
org_repo=${remote_url#*github.com[:/]}
org_repo=${org_repo%.git}
org=${org_repo%%/*}
repo=${org_repo#*/}
tap_name="${org}/${repo#homebrew-}"
local_path=$(git rev-parse --show-toplevel)

if brew tap-info "$tap_name" &>/dev/null; then
  current_remote=$(brew tap-info --json "$tap_name" | jq -r '.[0].remote')
  if [[ "$current_remote" == "$local_path" ]]; then
    echo "$tap_name is already tapped from $local_path"
    exit 0
  fi
  echo "Untapping $tap_name (currently from $current_remote)..."
  brew untap "$tap_name"
fi

echo "Tapping $tap_name from local directory..."
brew tap "$tap_name" "$local_path"
brew tap-info "$tap_name"
"""

[tasks."tap:remote"]
description = "Tap this repo from the GitHub remote"
run = """
#!/usr/bin/env zsh
set -euo pipefail
remote_url=$(git remote get-url origin)
org_repo=${remote_url#*github.com[:/]}
org_repo=${org_repo%.git}
org=${org_repo%%/*}
repo=${org_repo#*/}
tap_name="${org}/${repo#homebrew-}"

if brew tap-info "$tap_name" &>/dev/null; then
  current_remote=$(brew tap-info --json "$tap_name" | jq -r '.[0].remote')
  # Normalize to org/repo for comparison (Homebrew may store HTTPS, git remote may be SSH)
  current_normalized=${current_remote#*github.com[:/]}
  current_normalized=${current_normalized%.git}
  if [[ "$current_normalized" == "$org_repo" ]]; then
    echo "$tap_name is already tapped from remote ($current_remote)"
    exit 0
  fi
  echo "Untapping $tap_name (currently from $current_remote)..."
  brew untap "$tap_name"
fi

echo "Tapping $tap_name from remote..."
brew tap "$tap_name"
brew tap-info "$tap_name"
"""
